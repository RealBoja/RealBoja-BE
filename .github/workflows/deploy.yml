name: CI/CD Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build -x test

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs/

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ENV: ${{ secrets.ENV }}
        run: |
          printf "%s\n" "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh-keygen -y -f private_key.pem > /dev/null

          printf "%s" "$ENV" > .env

          echo "Downloaded artifact files:"
          ls -al build/libs/

          JAR_FILE=$(find build/libs -name '*.jar' ! -name '*plain.jar' | head -n 1)

          echo "Selected jar: $JAR_FILE"
          if [ -z "$JAR_FILE" ]; then
            echo "No executable jar found"
            exit 1
          fi

          ssh -i private_key.pem -o StrictHostKeyChecking=no -o BatchMode=yes $EC2_USERNAME@$EC2_HOST "whoami && pwd && ls -ld /home/$EC2_USERNAME"
          scp -v -i private_key.pem -o StrictHostKeyChecking=no "$JAR_FILE" $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/BackEnd.jar
          scp -v -i private_key.pem -o StrictHostKeyChecking=no .env $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/.env

          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "bash -lc '
            APP_DIR=/home/$EC2_USERNAME
            PID_FILE=\$APP_DIR/app.pid

            if [ -f \"\$PID_FILE\" ]; then
              kill \$(cat \"\$PID_FILE\") || true
              rm -f \"\$PID_FILE\"
              sleep 5
            fi

            set -a
            source \"\$APP_DIR/.env\"
            set +a

            nohup java -jar \"\$APP_DIR/BackEnd.jar\" > \"\$APP_DIR/app.log\" 2>&1 &
            echo \$! > \"\$PID_FILE\"
          '"

          rm -f private_key.pem .env
