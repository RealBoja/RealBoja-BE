name: CI/CD Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build -x test

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs/

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ENV: ${{ secrets.ENV }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

          printf "%s" "$ENV" > .env

          JAR_FILE=$(find build/libs -name '*.jar' ! -name '*plain.jar' | head -n 1)

          scp -i private_key.pem -o StrictHostKeyChecking=no "$JAR_FILE" $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/BackEnd.jar
          scp -i private_key.pem -o StrictHostKeyChecking=no .env $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/.env

          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "
            pkill -f 'java -jar /home/$EC2_USERNAME/BackEnd.jar' || true
            sleep 5
            set -a
            source /home/$EC2_USERNAME/.env
            set +a
            nohup java -jar /home/$EC2_USERNAME/BackEnd.jar > /home/$EC2_USERNAME/app.log 2>&1 &
          "

          rm -f private_key.pem .env